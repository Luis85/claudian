name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: LOC guard
        run: npm run check:loc

  quality:
    # Fallow quality ratchet (docs/build-ci/quality-gates.md): dead code,
    # duplication, and complexity metrics may improve but not regress past
    # scripts/quality-baseline.json.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Quality ratchet
        run: npm run check:quality

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  test:
    # Run on both Linux and Windows so platform-coupled path/spawn logic is
    # exercised on each target OS (POSIX vs win32 path semantics).
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

  coverage:
    # Enforce the coverageThreshold floors (Q-3 guardrail) on Linux only:
    # coverage is OS-independent, so the win32/ubuntu matrix above stays the
    # place that exercises platform-coupled path/spawn logic. Runs the full
    # suite (unit + integration) to match how the thresholds were measured.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test with coverage thresholds
        run: npm run test:coverage

  perf:
    # Deterministic perf scaling guards (docs/build-ci/quality-gates.md).
    # These specs assert that cost scales with a bounded window (counts of
    # DOM nodes, listeners, scheduler callbacks, parse passes) — never
    # wall-clock timings — so they are stable on noisy shared runners. The
    # report-only timing tables remain monitoring signal in the job log.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Perf scaling guards
        run: npm run test:perf

  build:
    # Exercise the production build (CSS concat, esbuild bundle, SDK patching,
    # renderer-unsafe-unref guard) on PRs, not only at release time, then smoke
    # the emitted artifacts for presence, version sync, and bundle-size budget.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Artifact smoke check
        run: npm run check:artifacts
