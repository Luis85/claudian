<!DOCTYPE html>
<!--
  Agent Board — redesign
  ======================
  A Kanban board for an agent execution workflow. Goal: stay minimal and read as a
  planning + execution surface, not a dense dashboard.

  Direction:
   • Borderless Linear-style columns — header + count, cards float (no heavy frames).
   • Minimal cards — title with a small status dot, lightened provider/model + priority,
     a thin acceptance-progress bar. Action buttons are hover-revealed: the single
     primary action (Run / Accept / Mark ready / Stop) plus a ⋯ overflow menu.
   • Live execution stays legible — running cards show an elapsed/attempt strip + last
     ledger line; a needs-input card shows its inline reply box (always visible, since
     it needs a response).
   • No extra execution chrome — it's a plain board; status colour is the only accent.

  Built on Obsidian design-system tokens, consistent with the work-order modal.
  Hover a card to reveal its actions. Open Tweaks to compare lane style, accent
  placement, density, and what meta shows.
-->

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Board — redesign</title>
